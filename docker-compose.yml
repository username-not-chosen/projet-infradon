services:
  db:
    image: postgis/postgis:16-3.4
    
    container_name: service-bancs-yvedon
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: service_bancs
    ports:
      - "5438:5432"
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d
      - ./data:/data
volumes:
  vaud_db_data:
