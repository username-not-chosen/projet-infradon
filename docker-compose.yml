services:
  db:
    image: postgres:16
    
    container_name: service-bancs-yvedon
    environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: service-bancs-yvedon
    ports:
            - "5437:5432"
    volumes:
      - ./data:/data    
      - ./initdb:/docker-entrypoint-initdb.d

